# Render Blueprint for Argus AML platform.
# Deploy: push to GitHub, then in Render → New → Blueprint → pick this repo.
services:
  - type: web
    name: argus-aml
    runtime: python
    plan: free
    pythonVersion: "3.13"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Required: makes `import config`, `import database`, `backend.api.*` resolve.
      - key: PYTHONPATH
        value: src
      # Session-hash salt. Set to a real secret in the Render dashboard.
      - key: ARGUS_SECRET
        generateValue: true
      # Uncomment to use a managed Postgres instead of bundled SQLite:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: argus-db
      #     property: connectionString

# Uncomment to provision managed Postgres (then set DATABASE_URL above):
# databases:
#   - name: argus-db
#     plan: free
