# Documentation only — Render uses dashboard settings, not this file.
# Kept in sync with actual Render configuration for reference.
services:
  - type: web
    name: argus-aml
    runtime: python
    plan: free
    buildCommand: pip install -r config/requirements.txt
    startCommand: uvicorn src.backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: src
      - key: PORT
        generateValue: false
